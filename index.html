<script>
  const noButton = document.getElementById("no");
  const yesButton = document.getElementById("yes");
  const area = document.getElementById("buttonArea");
  const message = document.getElementById("loveMessage");

  let attempts = 0;

  function moveNo() {
    attempts++;

    const areaWidth = area.clientWidth;
    const areaHeight = area.clientHeight;

    const buttonWidth = noButton.offsetWidth;
    const buttonHeight = noButton.offsetHeight;

    let x;
    let y;
    let tooClose = true;

    // Keep trying until the NO button is away from YES
    while (tooClose) {
      x = Math.random() * (areaWidth - buttonWidth);
      y = Math.random() * (areaHeight - buttonHeight);

      const noLeft = x;
      const noRight = x + buttonWidth;
      const noTop = y;
      const noBottom = y + buttonHeight;

      const yesLeft = yesButton.offsetLeft;
      const yesRight = yesLeft + yesButton.offsetWidth;
      const yesTop = yesButton.offsetTop;
      const yesBottom = yesTop + yesButton.offsetHeight;

      // Add extra safety space around YES button
      const padding = 40;

      tooClose =
        noRight > yesLeft - padding &&
        noLeft < yesRight + padding &&
        noBottom > yesTop - padding &&
        noTop < yesBottom + padding;
    }

    noButton.style.left = x + "px";
    noButton.style.top = y + "px";

    if (attempts === 5) {
      noButton.innerHTML = "Nice try 😂";
    }

    if (attempts === 10) {
      noButton.innerHTML = "YES is easier ❤️";
    }
  }

  noButton.addEventListener("mouseover", moveNo);

  noButton.addEventListener("touchstart", function (e) {
    e.preventDefault();
    moveNo();
  });

  noButton.addEventListener("click", moveNo);

  yesButton.addEventListener("click", function () {
    area.style.display = "none";

    message.classList.remove("hidden");
  });

  function createHeart() {
    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = 5 + Math.random() * 5 + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 8000);
  }

  setInterval(createHeart, 500);
</script>
