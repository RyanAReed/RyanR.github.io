<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>10 Years ❤️</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 25px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        width: 420px;
        position: relative;
      }

      h1 {
        color: #e91e63;
        font-size: 38px;
      }

      p {
        font-size: 20px;
        color: #555;
      }

      #buttonArea {
        height: 100px;
        position: relative;
        margin-top: 25px;
      }

      button {
        font-size: 22px;
        padding: 15px 35px;
        border-radius: 50px;
        border: none;
        cursor: pointer;
      }

      #yes {
        background: #4caf50;
        color: white;
        position: absolute;
        left: 60px;
        top: 25px;
      }

      #yes:hover {
        transform: scale(1.1);
      }

      #no {
        background: #f44336;
        color: white;
        position: absolute;
        left: 230px;
        top: 25px;
      }

      #loveMessage {
        font-size: 26px;
        color: #e91e63;
        margin-top: 20px;
      }

      .hidden {
        display: none;
      }

      .heart {
        position: absolute;
        color: white;
        font-size: 25px;
        animation: float 8s linear infinite;
      }

      @keyframes float {
        from {
          transform: translateY(100vh);
        }
        to {
          transform: translateY(-10vh);
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>❤️ 10 Years ❤️</h1>

      <p>
        Happy 10th Anniversary!
        <br /><br />
        After 10 amazing years together...
        <br />
        Do you still love me?
        <br /><br />
        (There is only one correct answer 😘)
      </p>

      <div id="buttonArea">
        <button id="yes">YES ❤️</button>

        <button id="no">NO 😈</button>
      </div>

      <div id="loveMessage" class="hidden">
        🥰 I knew it! ❤️
        <br /><br />

        10 years later and you're still my favorite person.
        <br /><br />

        Looks like you're stuck with me forever! 😁❤️
      </div>
    </div>

    <script>
      const noButton = document.getElementById("no");
      const yesButton = document.getElementById("yes");
      const area = document.getElementById("buttonArea");
      const message = document.getElementById("loveMessage");

      let attempts = 0;

      function moveNo() {
        attempts++;

        const maxX = area.clientWidth - noButton.offsetWidth;
        const maxY = area.clientHeight - noButton.offsetHeight;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        noButton.style.left = x + "px";
        noButton.style.top = y + "px";

        if (attempts > 5) {
          noButton.innerHTML = "Nice try 😂";
        }

        if (attempts > 10) {
          noButton.innerHTML = "You know YES is easier ❤️";
        }
      }

      noButton.addEventListener("mouseover", moveNo);

      noButton.addEventListener("click", moveNo);

      yesButton.addEventListener("click", () => {
        document.getElementById("buttonArea").style.display = "none";

        message.classList.remove("hidden");
      });

      function createHeart() {
        let heart = document.createElement("div");

        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = 5 + Math.random() * 5 + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 8000);
      }

      setInterval(createHeart, 500);
    </script>
  </body>
</html>
