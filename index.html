<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>10 Years ❤️</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      .card {
        position: relative;
        background: white;
        width: 90%;
        max-width: 450px;
        padding: 30px 20px;
        border-radius: 25px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      }

      h1 {
        color: #e91e63;
        font-size: 36px;
      }

      p {
        font-size: 20px;
        line-height: 1.5;
        color: #555;
      }

      #buttonArea {
        height: 300px;
        position: relative;
        margin-top: 20px;
      }

      button {
        font-size: 22px;
        padding: 15px 25px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        touch-action: manipulation;
      }

      #yes {
        background: #4caf50;
        color: white;
        position: absolute;
        left: 8%;
        top: 80px;
      }

      #no {
        background: #f44336;
        color: white;
        position: absolute;
        left: 60%;
        top: 80px;
      }

      #loveMessage {
        color: #e91e63;
        font-size: 24px;
        line-height: 1.5;
      }

      #devil {
        font-size: 60px;
        margin-top: 10px;
        opacity: 0;
        transform: scale(0.8);
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
      }

      #devil.visible {
        opacity: 1;
        transform: scale(1);
      }

      .hidden {
        display: none;
      }

      .heart {
        position: absolute;
        color: white;
        font-size: 25px;
        animation: float 8s linear infinite;
      }

      @keyframes float {
        from {
          transform: translateY(100vh);
        }

        to {
          transform: translateY(-10vh);
        }
      }

      @media (max-width: 400px) {
        h1 {
          font-size: 30px;
        }

        p {
          font-size: 18px;
        }

        button {
          font-size: 20px;
          padding: 14px 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>❤️ 10 Years ❤️</h1>

      <p>
        Happy 10th Anniversary!

        <br /><br />

        After 10 amazing years together...

        <br /><br />

        Do you still love me?

        <br /><br />

        (There is only one correct answer 😘)
      </p>

      <div id="buttonArea">
        <button id="yes">YES ❤️</button>

        <button id="no">NO</button>
      </div>

      <div id="loveMessage" class="hidden">
        🥰 I knew it! ❤️

        <br /><br />

        10 years later and you're still my favorite person.

        <br /><br />

        Looks like you're stuck with me forever! 😁❤️
      </div>

      <div id="devil" class="hidden">😈</div>
    </div>

    <script>
      const noButton = document.getElementById("no");
      const area = document.getElementById("buttonArea");
      const yesButton = document.getElementById("yes");
      const message = document.getElementById("loveMessage");

      let attempts = 0;
      let ignoreNextClick = false;

      function moveNo() {
        attempts++;

        const areaWidth = area.clientWidth;
        const areaHeight = area.clientHeight;

        const noWidth = noButton.offsetWidth;
        const noHeight = noButton.offsetHeight;

        // Keep NO only on the right side
        // YES is always safe

        const minX = areaWidth * 0.55;
        const maxX = areaWidth - noWidth - 10;

        const minY = -Math.floor(noHeight * 0.5);
        const maxY = areaHeight - noHeight - 10;

        const x = minX + Math.random() * (maxX - minX);
        const y = minY + Math.random() * (maxY - minY);

        noButton.style.left = x + "px";
        noButton.style.top = y + "px";

        if (attempts === 3) {
          noButton.innerHTML = "Really? 😂";
        }

        if (attempts === 6) {
          noButton.innerHTML = "Try again ❤️";
        }

        if (attempts === 10) {
          noButton.innerHTML = "You know the answer 😘";
        }
      }

      function handleNoButtonEvent(event) {
        event.preventDefault();

        if (event.type === "click" && ignoreNextClick) {
          ignoreNextClick = false;
          return;
        }

        if (event.type === "touchend") {
          ignoreNextClick = true;
        }

        moveNo();
        showDevil();
      }

      // ONLY CLICK MOVES NO
      noButton.addEventListener("click", handleNoButtonEvent);

      // Mobile tap support
      noButton.addEventListener("touchend", handleNoButtonEvent, {
        passive: false,
      });

      const devil = document.getElementById("devil");
      let devilShown = false;

      yesButton.addEventListener("click", function () {
        document.getElementById("buttonArea").style.display = "none";

        message.classList.remove("hidden");
      });

      function showDevil() {
        if (devilShown) return;

        devilShown = true;
        devil.classList.remove("hidden");
        devil.classList.add("visible");
      }

      function createHeart() {
        const heart = document.createElement("div");

        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";

        heart.style.animationDuration = 5 + Math.random() * 5 + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 8000);
      }

      setInterval(createHeart, 500);
    </script>
  </body>
</html>
